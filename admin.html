<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="theme-color" content="#ffc928"><title>Administración | Pepe GO!</title>
  <link rel="icon" type="image/png" href="assets/logo.png"><link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin-body"><header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">PG</span><span>Pepe <strong>GO!</strong><small>Tu Compa de Viajes</small></span></a><a class="admin-link" href="index.html">Ver portal</a></header>
<main class="admin-main"><section id="login-view" class="login-card"><span class="eyebrow">Área privada</span><h1>Administración</h1><p>Ingresa con la contraseña configurada en Apps Script.</p><form id="login-form"><label for="password">Contraseña</label><input id="password" type="password" required autocomplete="current-password"><button type="submit">Entrar al panel</button><p id="login-message" class="form-message" role="status"></p></form></section>
<section id="dashboard-view" hidden><div class="dashboard-head"><div><span class="eyebrow">Panel de control</span><h1>Operación de viajes</h1></div><button id="logout" class="button-secondary">Cerrar sesión</button></div><div id="dashboard-stats" class="stats-grid"></div><div class="admin-grid"><section class="admin-card"><h2>Registrar cliente y viaje</h2><form id="trip-form" class="admin-form"><div class="form-section">Datos del cliente</div><div class="field-grid"><label>Nombre<input name="nombre" required></label><label>Correo<input name="email" type="email" required></label><label>Teléfono<input name="telefono" type="tel"></label></div><div class="form-section">Datos del viaje</div><div class="field-grid"><label>Folio<input name="folio" placeholder="PG-2026-001" required></label><label>Destino<input name="destino" required></label><label>Hotel<input name="hotel" required></label><label>Pasajeros<input name="pasajeros" type="number" min="1" required></label><label>Salida<input name="fechaSalida" type="date" required></label><label>Regreso<input name="fechaRegreso" type="date" required></label><label>Costo total<input name="costoTotal" type="number" min="0" step="0.01" required></label><label>Estatus<select name="estatus"><option>Confirmado</option><option>Pendiente de pago</option><option>Documentación pendiente</option><option>Completado</option><option>Cancelado</option></select></label><label>Fecha próximo pago<input name="proximoPagoFecha" type="date"></label><label>Monto próximo pago<input name="proximoPagoMonto" type="number" min="0" step="0.01"></label></div><label>URL de itinerario<input name="itinerarioUrl" type="url" placeholder="https://..."></label><label>URL de vouchers<input name="vouchersUrl" type="url" placeholder="https://..."></label><button type="submit">Guardar cliente y viaje</button><p id="trip-message" class="form-message" role="status"></p></form></section><section class="admin-card"><h2>Registrar pago</h2><form id="payment-form" class="admin-form"><label>Folio del viaje<input name="folio" required></label><label>Fecha del pago<input name="fecha" type="date" required></label><label>Monto<input name="monto" type="number" min="0.01" step="0.01" required></label><label>Método de pago<input name="metodo" placeholder="Transferencia, efectivo..." required></label><label>Nota (opcional)<input name="nota"></label><button type="submit">Registrar pago</button><p id="payment-message" class="form-message" role="status"></p></form></section></div><section class="admin-card records-card"><div class="card-title-row"><h2>Viajes recientes</h2><button id="refresh" class="button-secondary">Actualizar</button></div><div class="table-wrap"><table><thead><tr><th>Folio</th><th>Cliente</th><th>Destino</th><th>Salida</th><th>Saldo</th><th>Estatus</th></tr></thead><tbody id="trips-table"></tbody></table></div></section></section></main><script src="config.js"></script><script src="js/api.js"></script><script src="js/admin.js"></script></body></html>
